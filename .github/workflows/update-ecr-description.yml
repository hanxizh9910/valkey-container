name: Update ECR Public Description

on:
  workflow_call:
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true
      ECR_REPOSITORY_NAME:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  update-ecr-catalog:
    runs-on: ubuntu-latest
    name: Update ECR Public Catalog Data
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-east-1

    - name: Parse README.md and extract usage/about text
      id: parsed
      run: |
        python3 .github/scripts/extract_sections.py dockerhub-description.md > parsed.json
        echo "parsed=$(cat parsed.json | jq -c .)" >> $GITHUB_OUTPUT

    - name: Update ECR Public catalog data
      run: |
        REPO_NAME="${{ secrets.ECR_REPOSITORY_NAME }}"

        ABOUT="${{ fromJson(steps.parsed.outputs.parsed).about }}"
        USAGE="${{ fromJson(steps.parsed.outputs.parsed).usage }}"

        ABOUT_JSON=$(echo "$ABOUT" | jq -Rs .)
        USAGE_JSON=$(echo "$USAGE" | jq -Rs .)

        cat > catalog-data.json <<-EOF
          {
            "repositoryName": "$REPO_NAME",
            "catalogData": {
              "description": "Auto-updated container image",
              "aboutText": $ABOUT_JSON,
              "usageText": $USAGE_JSON,
              "operatingSystems": ["Linux"]
            }
          }
        EOF

        echo "Updating ECR catalog data..."
        aws ecr-public put-repository-catalog-data \
          --cli-input-json file://catalog-data.json \
          --region us-east-1
