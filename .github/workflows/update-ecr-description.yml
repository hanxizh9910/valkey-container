name: Update ECR Public Description

on:
  workflow_call:
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true
      ECR_REPOSITORY_NAME:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  update-ecr-catalog:
    runs-on: ubuntu-latest
    name: Update ECR Public Catalog Data
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-east-1
        
    - name: Update ECR Public catalog data
      run: |
        # Get the repository name from secret
        REPO_NAME="${{ secrets.ECR_REPOSITORY_NAME }}"
        
        echo "Repository name: $REPO_NAME"
        
        # Create catalog data with extracted repository name
        cat > catalog-data.json << EOF
        {
          "repositoryName": "$REPO_NAME",
          "catalogData": {
            "description": "Auto-updated container image",
            "aboutText": "## About\n\nThis is an automatically updated container image.",
            "usageText": "## Usage\n\nThis is an automatically updated container image.",
            "operatingSystems": ["Linux"]
          }
        }
        EOF
        
        echo "Updating ECR catalog data..."
        aws ecr-public put-repository-catalog-data \
          --cli-input-json file://catalog-data.json \
          --region us-east-1
          
        echo "Done!"
